<nav class="navbar">
  <a routerLink="/" class="navbar-brand" style="text-decoration: none;">
    <span class="brand-icon">🍔</span>
    <span class="brand-name">Fast<span class="brand-accent">Bite</span></span>
  </a>
  <div class="navbar-actions">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input
        id="searchInput"
        type="text"
        class="search-input"
        [placeholder]="'NAVBAR.SEARCH' | translate"
        (input)="onSearch($any($event.target).value)"
      />
    </div>

    <!-- Lang toggle -->
    <button class="theme-toggle" (click)="toggleLang()" title="Cambiar idioma">
      <span class="theme-icon">{{ translate.currentLang === 'en' ? '🇺🇸' : '🇲🇽' }}</span>
    </button>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle" (click)="themeSvc.toggle()" [title]="themeSvc.isDark() ? ('NAVBAR.LIGHT_MODE' | translate) : ('NAVBAR.DARK_MODE' | translate)">
      @if (themeSvc.isDark()) {
        <span class="theme-icon">☀️</span>
      } @else {
        <span class="theme-icon">🌙</span>
      }
    </button>

    <!-- Auth -->
    @if (authSvc.currentUser()) {
      <div class="user-profile" (click)="authSvc.logout()" title="Cerrar sesión" style="cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: var(--accent); color: white; border-radius: 50%; font-weight: bold; font-size: 1.1rem; margin-left: 8px;">
        {{ authSvc.currentUser()?.name?.charAt(0)?.toUpperCase() }}
      </div>
    } @else {
      <a routerLink="/login" class="login-btn" style="text-decoration: none; background: var(--surface2); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; color: var(--text1); font-weight: 600; margin-left: 8px; font-size: 0.9rem;">
        Login
      </a>
    }

    <!-- Cart button -->
    <button class="cart-btn" id="cartBtn" (click)="onCartClick()">
      <span class="cart-icon">🛒</span>
      @if (svc.cartCount() > 0) {
        <span class="cart-badge">{{ svc.cartCount() }}</span>
      }
    </button>
  </div>
</nav>
