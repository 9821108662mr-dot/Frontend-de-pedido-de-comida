<nav class="navbar">
  <a routerLink="/" class="navbar-brand" style="text-decoration: none;">
    <span class="brand-icon">🍔</span>
    <span class="brand-name">Fast<span class="brand-accent">Bite</span></span>
  </a>
  <div class="navbar-actions">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input
        id="searchInput"
        type="text"
        class="search-input"
        [placeholder]="'NAVBAR.SEARCH' | translate"
        (input)="onSearch($any($event.target).value)"
      />
    </div>

    <!-- Lang toggle -->
    <button class="theme-toggle" (click)="toggleLang()" title="Cambiar idioma">
      <span class="theme-icon">{{ translate.currentLang === 'en' ? '🇺🇸' : '🇲🇽' }}</span>
    </button>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle" (click)="themeSvc.toggle()" [title]="themeSvc.isDark() ? ('NAVBAR.LIGHT_MODE' | translate) : ('NAVBAR.DARK_MODE' | translate)">
      @if (themeSvc.isDark()) {
        <span class="theme-icon">☀️</span>
      } @else {
        <span class="theme-icon">🌙</span>
      }
    </button>

    <!-- Cart button -->
    <button class="cart-btn" id="cartBtn" (click)="onCartClick()">
      <span class="cart-icon">🛒</span>
      @if (svc.cartCount() > 0) {
        <span class="cart-badge">{{ svc.cartCount() }}</span>
      }
    </button>
  </div>
</nav>
