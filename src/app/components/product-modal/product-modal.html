@if (open && product) {
  <div class="modal-overlay" [class.open]="open" (click)="onOverlayClick($event)">
    <div class="product-modal" role="dialog" aria-modal="true">
      <button class="modal-close" (click)="close.emit()" aria-label="Cerrar">✕</button>
      <div class="modal-image-wrapper">
        <img class="modal-image" [src]="product.image" [alt]="product.name" />
        <span class="modal-category-badge">{{ product.category }}</span>
      </div>
      <div class="modal-body">
        <h2 class="modal-name">{{ product.name }}</h2>
        <p class="modal-price">${{ product.price.toFixed(2) }}</p>
        <div class="modal-qty">
          <button class="qty-btn" (click)="decrement()" id="qtyMinus">−</button>
          <span class="qty-value">{{ qty() }}</span>
          <button class="qty-btn" (click)="increment()" id="qtyPlus">+</button>
        </div>
        <button class="modal-add-btn" (click)="addToCart()">
          Agregar {{ qty() }} al carrito 🛒 — ${{ (product.price * qty()).toFixed(2) }}
        </button>
      </div>
    </div>
  </div>
}
